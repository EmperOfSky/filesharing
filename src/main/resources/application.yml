server:
  port: 8080

spring:
  application:
    name: file-sharing-system
  
  # 数据库配置（使用H2内存数据库便于测试）
  datasource:
    url: jdbc:h2:mem:filesharing
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true
  
  # H2控制台配置
  h2:
    console:
      enabled: true
      path: /h2-console
    
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true

# 文件存储配置
file:
  upload:
    path: ./uploads/
    temp-path: ./temp/
    max-size: 104857600  # 100MB
    allowed-types: 
      - image/jpeg
      - image/png
      - image/gif
      - application/pdf
      - text/plain
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - video/mp4
      - audio/mpeg

# JWT配置
jwt:
  secret: filesharing_secret_key_2023_filesharing_secret_key_2023
  expiration: 86400000  # 24小时
  header: Authorization
  token-prefix: Bearer 

# 日志配置
logging:
  level:
    com.filesharing: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Swagger配置（暂不启用）
# springfox:
#   documentation:
#     swagger-ui:
#       enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics