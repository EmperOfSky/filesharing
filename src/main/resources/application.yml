server:
  port: 8080

spring:
  application:
    name: file-sharing-system
  
  # 数据库配置 - MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/filesharing?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456 
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: true
    
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true

# 文件存储配置
file:
  upload:
    path: ./uploads/
    temp-path: ./temp/
    max-size: 104857600  # 100MB
    allowed-types: 
      - image/jpeg
      - image/png
      - image/gif
      - application/pdf
      - text/plain
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - video/mp4
      - audio/mpeg

# 额外上传相关配置（被新的后端校验使用）
upload:
  chunk:
    max-size: 5242880   # 单分片最大 5MB
  file:
    max-size: 10737418240  # 单文件最大 10GB
  allowed-types-csv: image/jpeg,image/png,image/gif,application/pdf,text/plain,video/mp4,audio/mpeg
  cleanup:
    expire-hours: 24

# JWT配置
jwt:
  secret: filesharing_super_secure_secret_key_2023_this_is_a_very_long_and_secure_secret_key_for_jwt_hs512_algorithm_usage_minimum_512_bits_required_for_security
  expiration: 86400000  # 24小时
  header: Authorization
  token-prefix: Bearer 

# 日志配置
logging:
  level:
    com.filesharing: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Swagger配置（暂不启用）
# springfox:
#   documentation:
#     swagger-ui:
#       enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# FileCodeBox 兼容配置
fcb:
  open-upload: true
  upload-size: 10485760
  upload-count: 10
  upload-minute: 1
  error-count: 10
  error-minute: 1
  max-save-seconds: 0
  expire-styles: day,hour,minute,forever,count
  presign-expire-seconds: 900
  download-token-ttl-seconds: 600