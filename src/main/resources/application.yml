server:
  port: ${HTTPS_PORT:8443}
  server-header: ""
  http:
    port: ${HTTP_PORT:8080}
  ssl:
    enabled: ${HTTPS_ENABLED:true}
    key-store: ${HTTPS_KEY_STORE:classpath:certs/keystore.p12}
    key-store-password: ${HTTPS_KEY_STORE_PASSWORD:changeit}
    key-store-type: PKCS12
    key-alias: ${HTTPS_KEY_ALIAS:filesharing}
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
    include-exception: false

spring:
  application:
    name: file-sharing-system
  
  # 数据库配置 - MySQL
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/filesharing?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: true
    
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
      enabled: true

# 文件存储配置
file:
  upload:
    path: ${FILE_UPLOAD_PATH:./uploads/}
    temp-path: ${FILE_UPLOAD_TEMP_PATH:./temp/}
    max-size: 104857600  # 100MB
    allowed-types: 
      - image/jpeg
      - image/png
      - image/gif
      - application/pdf
      - text/plain
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - video/mp4
      - audio/mpeg

# 存储后端配置：local 或 minio
storage:
  type: ${STORAGE_TYPE:minio}
  minio:
    endpoint: ${STORAGE_MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${STORAGE_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_MINIO_SECRET_KEY:minioadmin}
    bucket: ${STORAGE_MINIO_BUCKET:filesharing}
    base-path: ${STORAGE_MINIO_BASE_PATH:app}

backup:
  base-path: ${BACKUP_BASE_PATH:./backups/}
  max-size: ${BACKUP_MAX_SIZE:10737418240}
  compression-level: ${BACKUP_COMPRESSION_LEVEL:6}

# 额外上传相关配置（被新的后端校验使用）
upload:
  chunk:
    max-size: 5242880   # 单分片最大 5MB
  file:
    max-size: 104857600  # 单文件最大 100MB
  allowed-types-csv: image/jpeg,image/png,image/gif,application/pdf,text/plain,video/mp4,audio/mpeg
  cleanup:
    expire-hours: 24

app:
  security:
    cors:
      allowed-origins:
        - ${CORS_ORIGIN_1:http://localhost:3000}
        - ${CORS_ORIGIN_2:http://127.0.0.1:3000}
        - ${CORS_ORIGIN_3:http://localhost:5173}
        - ${CORS_ORIGIN_4:http://127.0.0.1:5173}
        - ${CORS_ORIGIN_5:https://www.filesharing.asia}
        - ${CORS_ORIGIN_6:https://filesharing.asia}
      allowed-origin-patterns:
        - ${CORS_ORIGIN_PATTERN_1:https://*.filesharing.asia}
    rate-limit:
      global-per-second: 50
      endpoint-limits:
        /api/auth/login: 20
        /api/upload/**: 20
        /api/admin/**: 10
    upload:
      max-file-size-bytes: 104857600
      enable-malware-scan: true
      allowed-extensions:
        - jpg
        - jpeg
        - png
        - gif
        - pdf
        - txt
        - doc
        - docx
        - xls
        - xlsx
        - mp4
        - mp3
        - zip
        - rar
      blocked-extensions:
        - jsp
        - jspx
        - exe
        - dll
        - bat
        - cmd
        - sh
        - ps1
        - php
        - js
        - jar
        - war
        - vbs
        - com
        - msi

# JWT配置
jwt:
  secret: filesharing_super_secure_secret_key_2023_this_is_a_very_long_and_secure_secret_key_for_jwt_hs512_algorithm_usage_minimum_512_bits_required_for_security
  expiration: 86400000  # 24小时
  header: Authorization
  token-prefix: Bearer 

# 日志配置
logging:
  level:
    com.filesharing: INFO
    org.springframework.web: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Swagger配置（暂不启用）
# springfox:
#   documentation:
#     swagger-ui:
#       enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# 快传配置（兼容 fcb 前缀）
fcb:
  open-upload: true
  upload-size: 10485760
  upload-count: 10
  upload-minute: 1
  error-count: 10
  error-minute: 1
  max-save-seconds: 0
  expire-styles: day,hour,minute,forever,count
  presign-expire-seconds: 900
  download-token-ttl-seconds: 600

# GeoIP 地址解析配置
geoip:
  service-url: https://ipwho.is/{ip}
  timeout-ms: 3000